<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KMS Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111;
  --surface: #1c1c1c;
  --surface2: #252525;
  --border: #333;
  --text: #ddd;
  --muted: #777;
  --accent: #4a9eff;
  --accent-dim: #1e3a5f;
  --ok: #4caf50;
  --err: #e57373;
  --tag: #2a3a2a;
  --tag-text: #7ecf7e;
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── Header ── */
#header {
  height: 48px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; padding: 0 16px; flex-shrink: 0;
}
#header h1 { font-size: 14px; font-weight: 600; color: var(--accent); white-space: nowrap; }
#search-wrap { flex: 1; display: flex; gap: 8px; max-width: 560px; }
#search-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text); padding: 5px 10px; font-size: 13px; outline: none;
}
#search-input:focus { border-color: var(--accent); }
button {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 5px 11px; border-radius: 5px; cursor: pointer; font-size: 12px; white-space: nowrap;
}
button:hover { border-color: var(--accent); color: var(--accent); }
button.primary { background: var(--accent-dim); border-color: var(--accent); color: #9ecfff; }
button.primary:hover { background: #254f7a; color: #fff; }
button.ghost { background: none; border-color: transparent; color: var(--muted); font-size: 11px; }
button.ghost:hover { border-color: var(--border); color: var(--text); }

/* ── Main layout ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: 240px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-head {
  padding: 8px 12px; font-size: 10px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
#tree { overflow-y: auto; flex: 1; padding: 4px 0; }

/* Tree rows */
.t-row { display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 3px 0; user-select: none; }
.t-row:hover { background: var(--surface2); }
.t-caret { font-size: 9px; color: var(--muted); transition: transform 0.12s; display: inline-block; width: 10px; text-align: center; }
.t-caret.open { transform: rotate(90deg); }
.t-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.t-cnt { font-size: 10px; color: var(--muted); padding-right: 8px; }
.t-children.collapsed { display: none; }

.t-discipline { padding-left: 10px; font-weight: 600; font-size: 12px; color: #7db8f7; }
.t-area       { padding-left: 22px; font-size: 11px; color: #9da8b4; }
.t-topic      { padding-left: 34px; font-size: 11px; color: var(--muted); }
.t-pattern    { padding-left: 46px; font-size: 12px; color: var(--text); border-radius: 3px; }
.t-pattern:hover  { background: var(--surface2); }
.t-pattern.active { background: var(--accent-dim); color: #9ecfff; }

/* ── Content panel ── */
#content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.bar {
  padding: 8px 18px; font-size: 11px; color: var(--muted); background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; gap: 8px;
}
.bar span { color: var(--text); }

/* Placeholder */
#v-placeholder {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 8px; color: var(--muted);
}
#v-placeholder strong { font-size: 18px; color: #444; }

/* Node view */
#v-node { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#node-top {
  background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#breadcrumb {
  padding: 8px 18px; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px;
}
#node-meta {
  padding: 6px 18px 10px; display: flex; gap: 6px; flex-wrap: wrap;
}
.chip {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
  padding: 2px 7px; font-size: 11px; color: var(--muted);
}
.chip span { color: var(--text); }
.chip.tag { background: var(--tag); border-color: #3a4a3a; color: var(--tag-text); }

/* Node body: editor left, raw JSON right */
#node-body { flex: 1; display: flex; overflow: hidden; }
#editor-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#editor { flex: 1; overflow-y: auto; padding: 18px; }
.sec-block { margin-bottom: 18px; }
.sec-label {
  font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.6px; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
}
textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text); padding: 9px 11px; font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  font-size: 12px; line-height: 1.65; resize: vertical; outline: none;
}
textarea:focus { border-color: var(--accent); }
#editor-actions {
  padding: 10px 18px; border-top: 1px solid var(--border); background: var(--surface);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
#save-status { font-size: 11px; color: var(--muted); }
#save-status.ok { color: var(--ok); }
#save-status.err { color: var(--err); }

/* Raw JSON panel */
#raw-panel {
  width: 340px; flex-shrink: 0; border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#raw-panel-head {
  padding: 8px 12px; font-size: 10px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
#raw-panel-head span { color: var(--accent); }
#raw-json {
  flex: 1; overflow-y: auto; padding: 12px;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 11px;
  line-height: 1.6; color: #9da8b4; white-space: pre-wrap; word-break: break-all;
}

/* Search view */
#v-search { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#search-results { flex: 1; overflow-y: auto; padding: 16px; }
.r-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 12px 14px; margin-bottom: 10px; cursor: pointer;
}
.r-card:hover { border-color: var(--accent); }
.r-id { font-size: 10px; color: var(--accent); font-family: monospace; margin-bottom: 4px; }
.r-path { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.r-summary { font-size: 11px; color: #9da8b4; line-height: 1.5; }
.r-snippet {
  margin-top: 6px; font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  font-size: 11px; color: var(--muted); background: var(--bg);
  border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px;
  white-space: pre-wrap; word-break: break-all; max-height: 80px; overflow: hidden;
}

/* New node view */
#v-new { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#new-form { flex: 1; overflow-y: auto; padding: 18px; }
.f-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
.f-row { margin-bottom: 12px; }
.f-row label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
.f-row input, .f-row select {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text); padding: 6px 9px; font-size: 13px; outline: none;
}
.f-row input:focus { border-color: var(--accent); }
#new-actions { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
#new-status { font-size: 11px; color: var(--muted); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <h1>KMS Dashboard</h1>
  <div id="search-wrap">
    <input id="search-input" placeholder="kms_query: search by intent…" />
    <button onclick="doSearch()">Query</button>
  </div>
  <button class="primary" onclick="showView('v-new'); initNewForm()">+ New Node</button>
</div>

<div id="main">
  <!-- Sidebar: kms_list tree -->
  <div id="sidebar">
    <div id="sidebar-head">
      <span>kms_list</span>
      <span id="node-count" style="color:var(--text)">—</span>
    </div>
    <div id="tree"></div>
  </div>

  <!-- Content panel -->
  <div id="content">

    <!-- Placeholder -->
    <div id="v-placeholder">
      <strong>KMS Dashboard</strong>
      <span>Select a node (kms_fetch) or search by intent (kms_query)</span>
    </div>

    <!-- Node view: kms_fetch -->
    <div id="v-node" style="display:none">
      <div id="node-top">
        <div id="breadcrumb"></div>
        <div id="node-meta"></div>
      </div>
      <div id="node-body">
        <div id="editor-wrap">
          <div id="editor"></div>
          <div id="editor-actions">
            <button class="primary" onclick="saveNode()">Save</button>
            <button onclick="showView('v-placeholder')">Cancel</button>
            <span id="save-status"></span>
          </div>
        </div>
        <div id="raw-panel">
          <div id="raw-panel-head"><span>kms_fetch</span> response</div>
          <div id="raw-json"></div>
        </div>
      </div>
    </div>

    <!-- Search results: kms_query -->
    <div id="v-search" style="display:none">
      <div id="search-bar" class="bar">kms_query results</div>
      <div id="search-results"></div>
    </div>

    <!-- New node -->
    <div id="v-new" style="display:none">
      <div class="bar"><span>New Knowledge Node</span></div>
      <div id="new-form">
        <div class="f-grid">
          <div class="f-row"><label>Platform</label><input id="nf-platform" placeholder="flutter / ios / web / (blank)" /></div>
          <div class="f-row"><label>Project</label><input id="nf-project" placeholder="talenta / jurnal / (blank)" /></div>
          <div class="f-row"><label>Discipline *</label><input id="nf-discipline" placeholder="engineering" /></div>
        </div>
        <div class="f-grid">
          <div class="f-row"><label>Area</label><input id="nf-area" placeholder="architecture / testing / ui / …" /></div>
          <div class="f-row"><label>Artifact</label><input id="nf-artifact" placeholder="conventions / patterns / (blank)" /></div>
          <div class="f-row"><label>Topic *</label><input id="nf-topic" placeholder="domain" /></div>
        </div>
        <div class="f-grid">
          <div class="f-row"><label>Pattern *</label><input id="nf-pattern" placeholder="use_case" /></div>
          <div class="f-row"><label>Subtopic</label><input id="nf-subtopic" placeholder="(defaults to pattern)" /></div>
          <div class="f-row"><label>Tags (comma-separated)</label><input id="nf-tags" placeholder="clean-arch, flutter" /></div>
        </div>
        <div class="f-row">
          <label>Content (markdown with ## Section headers)</label>
          <textarea id="nf-content" style="min-height:320px;"></textarea>
        </div>
        <div id="new-actions">
          <button class="primary" onclick="saveNewNode()">Create Node</button>
          <button onclick="showView('v-placeholder')">Cancel</button>
          <span id="new-status"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
'use strict';

let allNodes = [];
let currentNode = null;

// ── Utils ──────────────────────────────────────────────────────────────

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showView(id) {
  ['v-placeholder','v-node','v-search','v-new'].forEach(v => {
    document.getElementById(v).style.display = (v === id) ? 'flex' : 'none';
  });
  if (id !== 'v-node') {
    document.querySelectorAll('.t-pattern.active').forEach(e => e.classList.remove('active'));
    if (id !== 'v-search') currentNode = null;
  }
}

// ── kms_list TOC ───────────────────────────────────────────────────────

async function loadTOC() {
  const res = await fetch('/api/list');
  allNodes = await res.json();
  document.getElementById('node-count').textContent = allNodes.length;
  buildTree(allNodes);
}

// Tree: discipline → area → topic → [patterns]
function buildTree(nodes) {
  const tree = {};
  for (const n of nodes) {
    const dis = n.discipline || '(none)';
    const area = n.area || '—';
    const top = n.topic || '(none)';
    if (!tree[dis]) tree[dis] = {};
    if (!tree[dis][area]) tree[dis][area] = {};
    if (!tree[dis][area][top]) tree[dis][area][top] = [];
    tree[dis][area][top].push(n);
  }

  const root = document.getElementById('tree');
  root.innerHTML = '';
  for (const dis of Object.keys(tree).sort()) {
    root.appendChild(makeDisciplineNode(dis, tree[dis]));
  }
}

function makeRow(cls, label, caret, count) {
  const row = document.createElement('div');
  row.className = `t-row ${cls}`;
  if (caret) {
    const c = document.createElement('span');
    c.className = 't-caret open';
    c.textContent = '▶';
    row.appendChild(c);
  }
  const lbl = document.createElement('span');
  lbl.className = 't-label';
  lbl.textContent = label;
  row.appendChild(lbl);
  if (count !== undefined) {
    const cnt = document.createElement('span');
    cnt.className = 't-cnt';
    cnt.textContent = count;
    row.appendChild(cnt);
  }
  return row;
}

function bindCollapse(row, children) {
  const caret = row.querySelector('.t-caret');
  row.addEventListener('click', e => {
    e.stopPropagation();
    caret.classList.toggle('open');
    children.classList.toggle('collapsed');
  });
}

function makeDisciplineNode(dis, areas) {
  const wrap = document.createElement('div');
  const row = makeRow('t-discipline', dis, true);
  const kids = document.createElement('div');
  kids.className = 't-children';
  for (const area of Object.keys(areas).sort()) {
    kids.appendChild(makeAreaNode(area, areas[area]));
  }
  bindCollapse(row, kids);
  wrap.appendChild(row);
  wrap.appendChild(kids);
  return wrap;
}

function makeAreaNode(area, topics) {
  const wrap = document.createElement('div');
  const row = makeRow('t-area', area, true);
  const kids = document.createElement('div');
  kids.className = 't-children';
  for (const top of Object.keys(topics).sort()) {
    kids.appendChild(makeTopicNode(top, topics[top]));
  }
  bindCollapse(row, kids);
  wrap.appendChild(row);
  wrap.appendChild(kids);
  return wrap;
}

function makeTopicNode(top, patNodes) {
  const wrap = document.createElement('div');
  const row = makeRow('t-topic', top, true, patNodes.length);
  const kids = document.createElement('div');
  kids.className = 't-children';
  for (const n of [...patNodes].sort((a,b) => a.pattern.localeCompare(b.pattern))) {
    const pr = document.createElement('div');
    pr.className = 't-row t-pattern';
    pr.textContent = n.pattern;
    pr.dataset.id = n.id;
    pr.addEventListener('click', e => { e.stopPropagation(); loadNode(n); });
    kids.appendChild(pr);
  }
  bindCollapse(row, kids);
  wrap.appendChild(row);
  wrap.appendChild(kids);
  return wrap;
}

// ── kms_fetch ─────────────────────────────────────────────────────────

async function loadNode(meta) {
  document.querySelectorAll('.t-pattern.active').forEach(e => e.classList.remove('active'));
  const el = document.querySelector(`.t-pattern[data-id="${CSS.escape(meta.id)}"]`);
  if (el) el.classList.add('active');

  const p = new URLSearchParams({
    id:         meta.id,
    discipline: meta.discipline,
    area:       meta.area       || '',
    artifact:   meta.artifact   || '',
    topic:      meta.topic,
    subtopic:   meta.subtopic   || meta.pattern,
    pattern:    meta.pattern,
  });
  if (meta.platform) p.set('platform', meta.platform);
  if (meta.project)  p.set('project',  meta.project);

  const res = await fetch('/api/fetch?' + p);
  if (!res.ok) { alert('Node not found'); return; }
  currentNode = await res.json();
  renderNodeView(currentNode);
  showView('v-node');
}

function renderNodeView(node) {
  // Breadcrumb: discipline > area > topic > pattern
  const parts = [node.discipline, node.area, node.topic, node.pattern].filter(Boolean);
  document.getElementById('breadcrumb').innerHTML =
    parts.map(p => `<span>${esc(p)}</span>`).join(' <span style="color:var(--border)"> › </span>');

  // Meta chips — mirrors kms_fetch response fields
  const chips = [];
  if (node.scope)      chips.push(['scope',      node.scope,      '']);
  if (node.platform)   chips.push(['platform',   node.platform,   '']);
  if (node.project)    chips.push(['project',    node.project,    '']);
  if (node.area)       chips.push(['area',       node.area,       '']);
  if (node.artifact)   chips.push(['artifact',   node.artifact,   '']);
  if (node.subtopic && node.subtopic !== node.pattern)
                       chips.push(['subtopic',   node.subtopic,   '']);
  if (node.updated_at) chips.push(['updated',    node.updated_at, '']);
  if (node.source_file) chips.push(['source',   node.source_file, '']);

  let metaHTML = chips.map(([k, v]) => `<div class="chip">${k}: <span>${esc(v)}</span></div>`).join('');
  if (node.tags && node.tags.length) {
    metaHTML += node.tags.map(t => `<div class="chip tag">${esc(t)}</div>`).join('');
  }
  document.getElementById('node-meta').innerHTML = metaHTML;

  // Editor
  const sections = parseSections(node.content || '');
  const editor = document.getElementById('editor');
  if (!sections.length) {
    editor.innerHTML = `<div class="sec-block">
      <div class="sec-label">Content</div>
      <textarea id="sec-0" style="min-height:300px;">${esc(node.content || '')}</textarea>
    </div>`;
  } else {
    editor.innerHTML = sections.map((s, i) => `
      <div class="sec-block">
        <div class="sec-label">${esc(s.header.replace(/^##\s*/, ''))}</div>
        <textarea id="sec-${i}" data-header="${esc(s.header)}"
          style="min-height:${Math.max(80, s.body.split('\n').length * 22 + 40)}px;"
        >${esc(s.body)}</textarea>
      </div>`).join('');
  }

  document.getElementById('save-status').textContent = '';
  document.getElementById('save-status').className = '';

  // Raw JSON panel — exactly what kms_fetch returns
  const raw = Object.assign({}, node);
  if (raw.content && raw.content.length > 500) {
    raw.content = raw.content.slice(0, 500) + '\n… (truncated for display)';
  }
  document.getElementById('raw-json').textContent = JSON.stringify(raw, null, 2);
}

// ── Section parsing ────────────────────────────────────────────────────

function parseSections(content) {
  const sections = [];
  let cur = null;
  for (const line of content.split('\n')) {
    if (line.startsWith('## ')) {
      if (cur) sections.push(cur);
      cur = { header: line, lines: [] };
    } else if (cur) {
      cur.lines.push(line);
    }
  }
  if (cur) sections.push(cur);
  return sections.map(s => ({ header: s.header, body: s.lines.join('\n').trimEnd() }));
}

function joinSections(sections) {
  return sections.map(s => s.header + '\n' + s.body).join('\n\n');
}

// ── Save (kms_upsert) ──────────────────────────────────────────────────

async function saveNode() {
  if (!currentNode) return;

  const textareas = [...document.querySelectorAll('#editor textarea')];
  let content;
  if (textareas.length === 1 && !textareas[0].dataset.header) {
    content = textareas[0].value;
  } else {
    content = joinSections(textareas.map(ta => ({ header: ta.dataset.header, body: ta.value })));
  }

  const statusEl = document.getElementById('save-status');
  statusEl.textContent = 'Saving…';
  statusEl.className = '';

  try {
    const res = await fetch('/api/upsert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        platform:   currentNode.platform,
        project:    currentNode.project,
        discipline: currentNode.discipline,
        area:       currentNode.area,
        artifact:   currentNode.artifact,
        topic:      currentNode.topic,
        subtopic:   currentNode.subtopic,
        pattern:    currentNode.pattern,
        content,
        summary:     currentNode.summary || '',
        tags:        currentNode.tags || [],
        source_file: currentNode.source_file,
      }),
    });
    if (res.ok) {
      currentNode.content = content;
      statusEl.textContent = `Saved · ${new Date().toLocaleTimeString()}`;
      statusEl.className = 'ok';
      // Refresh raw panel
      document.getElementById('raw-json').textContent =
        JSON.stringify(Object.assign({}, currentNode, { content: content.slice(0, 500) + (content.length > 500 ? '\n… (truncated)' : '') }), null, 2);
      loadTOC();
    } else {
      const d = await res.json();
      statusEl.textContent = 'Error: ' + (d.error || res.status);
      statusEl.className = 'err';
    }
  } catch (e) {
    statusEl.textContent = 'Error: ' + e.message;
    statusEl.className = 'err';
  }
}

// ── kms_query ─────────────────────────────────────────────────────────

async function doSearch() {
  const text = document.getElementById('search-input').value.trim();
  if (!text) return;

  showView('v-search');
  document.getElementById('search-bar').innerHTML = `kms_query: <span>${esc(text)}</span>`;
  document.getElementById('search-results').innerHTML = '<p style="color:var(--muted);padding:4px 0">Querying…</p>';

  try {
    const res = await fetch('/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, n_results: 5 }),
    });
    const nodes = await res.json();
    const el = document.getElementById('search-results');
    if (!nodes.length) {
      el.innerHTML = '<p style="color:var(--muted)">No results found.</p>';
      return;
    }
    el.innerHTML = nodes.map(n => `
      <div class="r-card" onclick='loadNode(${JSON.stringify(n)})'>
        <div class="r-id">${esc(n.id)}</div>
        <div class="r-path">${esc([n.discipline, n.area, n.topic].filter(Boolean).join(' › '))}</div>
        <div class="r-summary">${esc(n.summary || '—')}</div>
        ${n.content ? `<div class="r-snippet">${esc((n.content || '').slice(0, 200))}</div>` : ''}
      </div>`).join('');
  } catch (e) {
    document.getElementById('search-results').innerHTML = `<p style="color:var(--err)">Error: ${esc(e.message)}</p>`;
  }
}

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ── New node ───────────────────────────────────────────────────────────

function initNewForm() {
  ['nf-platform','nf-project','nf-area','nf-artifact','nf-topic','nf-pattern','nf-subtopic','nf-tags'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('nf-discipline').value = 'engineering';
  document.getElementById('nf-content').value = '## Theory\n\n\n## Definition\n\n\n## Code Pattern\n';
  document.getElementById('new-status').textContent = '';
  document.getElementById('new-status').style.color = '';
}

async function saveNewNode() {
  const disc    = document.getElementById('nf-discipline').value.trim();
  const topic   = document.getElementById('nf-topic').value.trim();
  const pattern = document.getElementById('nf-pattern').value.trim();
  const statusEl = document.getElementById('new-status');

  if (!disc || !topic || !pattern) {
    statusEl.textContent = 'Discipline, topic, and pattern are required.';
    statusEl.style.color = 'var(--err)';
    return;
  }

  const tagsRaw = document.getElementById('nf-tags').value.trim();
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
  const subtopic = document.getElementById('nf-subtopic').value.trim() || pattern;

  const body = {
    platform:   document.getElementById('nf-platform').value.trim() || null,
    project:    document.getElementById('nf-project').value.trim()  || null,
    discipline: disc,
    area:       document.getElementById('nf-area').value.trim()     || '',
    artifact:   document.getElementById('nf-artifact').value.trim() || null,
    topic, pattern, subtopic,
    content:    document.getElementById('nf-content').value,
    summary:    '',
    tags,
  };

  statusEl.textContent = 'Saving…';
  statusEl.style.color = 'var(--muted)';

  try {
    const res = await fetch('/api/upsert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (res.ok) {
      statusEl.textContent = `Created: ${data.id}`;
      statusEl.style.color = 'var(--ok)';
      await loadTOC();
      setTimeout(() => loadNode({ ...body, id: data.id }), 200);
    } else {
      statusEl.textContent = 'Error: ' + (data.error || res.status);
      statusEl.style.color = 'var(--err)';
    }
  } catch (e) {
    statusEl.textContent = 'Error: ' + e.message;
    statusEl.style.color = 'var(--err)';
  }
}

// ── Init ───────────────────────────────────────────────────────────────
loadTOC();
</script>
